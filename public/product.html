<body class="bg-surface text-on-surface font-body">

<header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-md flex items-center justify-between px-6 py-4 border-b border-amber-400/15 shadow-2xl">
  <a href="/" class="text-primary-container font-headline tracking-widest text-xl uppercase">SILKISLAND</a>
  <div class="flex items-center gap-4">
    <button onclick="history.back()" class="text-on-surface-variant hover:text-primary-container"><span class="material-symbols-outlined">arrow_back</span></button>
    <a href="/favorites.html" class="text-on-surface-variant hover:text-primary-container"><span class="material-symbols-outlined">favorite</span></a>
    <a href="/account.html" class="text-on-surface-variant hover:text-primary-container"><span class="material-symbols-outlined">person</span></a>
    <button onclick="toggleCart()" class="text-on-surface-variant hover:text-primary-container relative"><span class="material-symbols-outlined">shopping_bag</span><span id="cart-count" class="absolute -top-2 -right-2 bg-primary-container text-on-primary-container text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span></button>
    <select id="language-select" class="bg-transparent text-on-surface-variant border border-outline-variant rounded-sm px-2 py-1 text-sm uppercase tracking-wider">
      <option value="en" class="bg-surface">EN</option>
      <option value="ro" class="bg-surface">RO</option>
      <option value="tr" class="bg-surface">TR</option>
    </select>
  </div>
</header>

<main class="pt-20 pb-32">
  <div id="product-container" class="max-w-7xl mx-auto px-6">
    <div class="text-center py-20"><p class="text-tertiary-fixed-dim">Loading...</p></div>
  </div>
</main>

<div class="cart-modal fixed top-0 right-0 w-full max-w-md h-full z-[1000] bg-surface-container border-l border-white/5 shadow-2xl hidden overflow-y-auto" id="cart-modal">
  <div class="p-6"><div class="flex items-center justify-between mb-8"><h2 class="font-headline text-2xl text-primary-container">Your Selection</h2><button onclick="toggleCart()" class="text-on-surface-variant hover:text-primary-container"><span class="material-symbols-outlined text-3xl">close</span></button></div><div id="cart-items" class="space-y-6"></div><div class="border-t border-outline-variant/30 pt-6 mt-8"><div class="flex justify-between items-center mb-6"><span class="font-label text-lg uppercase tracking-wider">Total</span><span class="font-headline text-2xl text-primary-container" id="cart-total">0.00 RON</span></div><button onclick="goToCheckout()" class="w-full bg-primary-container text-on-primary-container py-4 font-label font-extrabold uppercase tracking-widest text-sm">Proceed to Checkout</button></div></div>
</div>

<script src="/script.js"></script>
<script>
const API_URL = window.API_URL || 'https://silkisland-api.amr-mokhtar301.workers.dev';
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');
let product = null;
let selectedColor = null;
let selectedSize = null;
let colorQuantities = {};

// Load product
async function loadProduct() {
  if (!productId) { 
    window.location.href = '/'; 
    return; 
  }
  try {
    const res = await fetch(API_URL + '/api/products/' + productId);
    product = await res.json();
    selectedColor = product.colors?.[0] || 'Default';
    selectedSize = product.sizes?.[0] || 'M';
    await renderProduct();
    
    // TikTok ViewContent event
    if (typeof ttq !== 'undefined' && ttq.track) {
        ttq.track('ViewContent', {
            content_id: product.id,
            content_name: product.name,
            price: parseFloat(product.price),
            currency: 'RON'
        });
    }
  } catch (e) { 
    console.error('Failed to load product:', e);
    document.getElementById('product-container').innerHTML = '<div class="text-center py-20"><p class="text-tertiary-fixed-dim">Product not found</p><a href="/" class="text-primary-container mt-4 inline-block">Return to Shop</a></div>';
  }
}

function getColorHex(color) {
  const map = {
    'Black': '#1a1a1a', 'White': '#ffffff', 'Nude': '#E3BC9A',
    'Light Beige': '#F5E6D3', 'Dark Beige': '#D4B896', 'Cappuccino': '#C1A58B',
    'Rose': '#E8A2B4', 'Powder Pink': '#F4C2C2', 'Mauve': '#E0B0FF',
    'Pink Peach': '#FFDAB9', 'Red': '#8B0000', 'Burgundy': '#800020',
    'Navy': '#000080', 'Midnight Blue': '#3D3F93', 'Gold': '#FFD700',
    'Silver': '#C0C0C0', 'Default': '#888888'
  };
  return map[color] || '#888888';
}

function buildColorQuantitySelectors() {
  const container = document.getElementById('color-quantity-selector');
  if (!container) return;
  const colors = product.colors || ['Black'];
  colorQuantities = {};
  
  container.innerHTML = colors.map(color => `
    <div class="flex items-center justify-between p-2 bg-surface-container-low/30 rounded-lg">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full border-2 border-white/20" style="background-color:${getColorHex(color)};"></div>
        <span class="text-sm text-on-surface">${color}</span>
      </div>
      <div class="flex items-center gap-2">
        <button class="qty-decrease w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant hover:bg-primary-container hover:text-on-primary-container" data-color="${color}">−</button>
        <span class="w-8 text-center font-bold" id="qty-${color.replace(/\s+/g, '-')}">0</span>
        <button class="qty-increase w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant hover:bg-primary-container hover:text-on-primary-container" data-color="${color}">+</button>
      </div>
    </div>
  `).join('');
  
  colors.forEach(c => colorQuantities[c] = 0);
  
  document.querySelectorAll('.qty-increase').forEach(btn => {
    btn.addEventListener('click', () => {
      const color = btn.dataset.color;
      colorQuantities[color] = (colorQuantities[color] || 0) + 1;
      const qtyEl = document.getElementById(`qty-${color.replace(/\s+/g, '-')}`);
      if (qtyEl) qtyEl.textContent = colorQuantities[color];
    });
  });
  
  document.querySelectorAll('.qty-decrease').forEach(btn => {
    btn.addEventListener('click', () => {
      const color = btn.dataset.color;
      colorQuantities[color] = Math.max(0, (colorQuantities[color] || 0) - 1);
      const qtyEl = document.getElementById(`qty-${color.replace(/\s+/g, '-')}`);
      if (qtyEl) qtyEl.textContent = colorQuantities[color];
    });
  });
}

async function renderProduct() {
  const container = document.getElementById('product-container');
  const images = product.images || [product.image];
  
  container.innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      <div class="space-y-4">
        <div class="overflow-hidden bg-surface-container-lowest border border-white/5 rounded-sm">
          <img src="${images[0]}" alt="${product.name}" id="main-image" class="w-full h-auto object-contain cursor-zoom-in">
        </div>
        ${images.length > 1 ? `
          <div class="flex gap-2 overflow-x-auto">
            ${images.map((img, i) => `<img src="${img}" onclick="document.getElementById('main-image').src='${img}'" class="w-20 h-20 object-cover rounded-sm cursor-pointer border border-white/10 hover:border-primary-container/50 transition-all">`).join('')}
          </div>
        ` : ''}
      </div>
      <div class="space-y-6">
        <div>
          <p class="text-tertiary-fixed-dim uppercase tracking-[0.2em] text-[10px] mb-2">${product.category || 'Limited Edition'}</p>
          <h1 class="font-headline text-4xl md:text-5xl text-primary-container">${product.name}</h1>
          <p class="font-headline text-3xl text-primary-container mt-4">${product.price} RON</p>
        </div>
        <p class="text-tertiary-fixed-dim font-light leading-relaxed text-lg italic">${product.description || 'A timeless piece from the Private Collection.'}</p>
        
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-on-surface-variant mb-3">Colors & Quantities</label>
          <div class="space-y-2" id="color-quantity-selector"></div>
        </div>
        
        <div>
          <div class="flex items-center justify-between mb-3">
            <label class="block text-[10px] uppercase tracking-widest text-on-surface-variant">Size: <span id="selected-size-display">${selectedSize}</span></label>
          </div>
          <div class="flex flex-wrap gap-3" id="size-selector">
            ${(product.sizes || ['M']).map(s => `<button data-size="${s}" class="size-btn px-6 py-2 rounded-full border ${selectedSize === s ? 'border-primary-container bg-primary-container text-on-primary-container' : 'border-outline-variant text-on-surface-variant'} text-xs font-bold tracking-widest">${s}</button>`).join('')}
          </div>
        </div>
        
        <div class="flex items-center gap-4 pt-4">
          <button id="add-to-cart-btn" class="flex-1 bg-primary-container text-on-primary-container py-4 font-bold uppercase tracking-widest text-sm">Add to Cart</button>
          <button id="favorite-btn" class="p-4 border border-outline-variant rounded-lg text-primary-container"><span class="material-symbols-outlined">favorite</span></button>
        </div>
      </div>
    </div>
  `;
  
  buildColorQuantitySelectors();
  
  // Size buttons
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      selectedSize = this.dataset.size;
      document.getElementById('selected-size-display').textContent = selectedSize;
      document.querySelectorAll('.size-btn').forEach(x => {
        x.classList.remove('border-primary-container', 'bg-primary-container', 'text-on-primary-container');
        x.classList.add('border-outline-variant', 'text-on-surface-variant');
      });
      this.classList.add('border-primary-container', 'bg-primary-container', 'text-on-primary-container');
    });
  });
  
  // Add to Cart button
  document.getElementById('add-to-cart-btn').addEventListener('click', () => {
    let cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
    let added = 0;
    
    Object.entries(colorQuantities).forEach(([color, qty]) => {
      if (qty > 0) {
        const existing = cart.find(i => i.id === product.id && i.size === selectedSize && i.color === color);
        if (existing) {
          existing.quantity += qty;
        } else {
          cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            size: selectedSize,
            color: color,
            quantity: qty,
            image: product.images?.[0] || product.image
          });
        }
        added += qty;
      }
    });
    
    if (added > 0) {
      localStorage.setItem('silkisland_cart', JSON.stringify(cart));
      updateCartCount();
      
      // TikTok AddToCart event
      if (typeof ttq !== 'undefined' && ttq.track) {
        ttq.track('AddToCart', {
          content_id: String(product.id),
          content_name: product.name,
          content_type: 'product',
          price: parseFloat(product.price),
          quantity: added,
          currency: 'RON'
        });
      }
      
      alert(`${added} item(s) added to cart!`);
    } else {
      alert('Please select at least one item.');
    }
  });
  
  // Favorite button
  document.getElementById('favorite-btn').addEventListener('click', () => {
    let favorites = JSON.parse(localStorage.getItem('silkisland_favorites') || '[]');
    if (!favorites.includes(product.id)) {
      favorites.push(product.id);
      localStorage.setItem('silkisland_favorites', JSON.stringify(favorites));
      alert('Added to favorites!');
    } else {
      alert('Already in favorites!');
    }
  });
  
  updateCartCount();
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
  const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  const el = document.getElementById('cart-count');
  if (el) el.textContent = count;
}

loadProduct();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SilkIsland — Product</title>
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DQM9C6V5SH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DQM9C6V5SH');
  </script>
  
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&family=Manrope:wght@200;400;600;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #131313;
      color: #e5e2e1;
      font-family: 'Manrope', sans-serif;
    }
    
    .font-headline { font-family: 'Noto Serif', serif; }
    
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    
    .glass-panel {
      background: rgba(19, 19, 19, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 215, 0, 0.15);
    }
    
    .modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    
    .lightbox-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .lightbox-modal.active { display: flex; }
    
    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .color-swatch.active {
      border-color: #FFD700;
      transform: scale(1.1);
      box-shadow: 0 0 0 2px rgba(255,215,0,0.3);
    }
    
    .size-btn {
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #e5e2e1;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      font-weight: bold;
    }
    .size-btn.active {
      background: #FFD700;
      color: #1a1a1a;
      border-color: #FFD700;
    }
    
    .quantity-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #e5e2e1;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quantity-btn:hover {
      background: #FFD700;
      color: #1a1a1a;
    }
    
    .cart-modal {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 480px;
      height: 100%;
      background: #1c1b1b;
      z-index: 2000;
      transition: right 0.3s ease;
      overflow-y: auto;
    }
    .cart-modal.open { right: 0; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md flex items-center justify-between px-6 py-4 border-b border-amber-400/20">
  <a href="/" class="text-amber-400 font-headline tracking-widest text-xl uppercase">SILKISLAND</a>
  <div class="flex items-center gap-5">
    <button onclick="history.back()" class="text-gray-300 hover:text-amber-400"><span class="material-symbols-outlined">arrow_back</span></button>
    <a href="/favorites.html" class="text-gray-300 hover:text-amber-400"><span class="material-symbols-outlined">favorite</span></a>
    <a href="/account.html" class="text-gray-300 hover:text-amber-400"><span class="material-symbols-outlined">person</span></a>
    <button onclick="toggleCart()" class="text-gray-300 hover:text-amber-400 relative">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span id="cart-count" class="absolute -top-2 -right-2 bg-amber-400 text-black text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
    </button>
    <select id="language-select" class="bg-transparent text-gray-300 border border-gray-600 rounded px-2 py-1 text-sm">
      <option value="en">EN</option>
      <option value="ro">RO</option>
      <option value="tr">TR</option>
    </select>
  </div>
</header>

<main class="pt-24 pb-20">
  <div id="product-container" class="max-w-7xl mx-auto px-6">
    <div class="text-center py-20 text-amber-400">Loading...</div>
  </div>
</main>

<!-- Cart Modal -->
<div id="cart-modal" class="cart-modal">
  <div class="p-6">
    <div class="flex justify-between items-center mb-8">
      <h2 class="font-headline text-2xl text-amber-400" id="cart-title">Your Cart</h2>
      <button onclick="toggleCart()" class="text-gray-400 hover:text-amber-400"><span class="material-symbols-outlined text-3xl">close</span></button>
    </div>
    <div id="cart-items" class="space-y-4"></div>
    <div class="border-t border-gray-700 pt-6 mt-8">
      <div class="flex justify-between items-center mb-6">
        <span class="text-lg" id="cart-total-label">Total</span>
        <span class="font-headline text-2xl text-amber-400" id="cart-total">0 RON</span>
      </div>
      <button onclick="goToCheckout()" class="w-full bg-amber-400 text-black py-4 font-bold uppercase tracking-wider rounded-lg">Proceed to Checkout</button>
    </div>
  </div>
</div>

<!-- Size Guide Modal -->
<div id="size-guide-modal" class="modal" onclick="closeSizeGuide(event)">
  <div class="glass-panel p-6 rounded-lg max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-headline text-xl text-amber-400" id="size-guide-title">Size Guide</h3>
      <button onclick="closeSizeGuide()" class="text-gray-400 hover:text-amber-400"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="size-guide-content"></div>
  </div>
</div>

<!-- Review Modal -->
<div id="review-modal" class="modal" onclick="closeReviewModal(event)">
  <div class="glass-panel p-6 rounded-lg max-w-md w-full mx-4" onclick="event.stopPropagation()">
    <h3 class="font-headline text-xl text-amber-400 mb-4" id="review-title">Write a Review</h3>
    <form onsubmit="submitReview(event)">
      <div class="mb-4">
        <label class="block text-xs text-gray-400 mb-2" id="rating-label">Rating</label>
        <div class="flex gap-2" id="star-rating">
          ${[1,2,3,4,5].map(i => `<span class="material-symbols-outlined cursor-pointer text-2xl text-gray-500" onclick="setRating(${i})">star</span>`).join('')}
        </div>
        <input type="hidden" id="review-rating" value="5">
      </div>
      <div class="mb-4">
        <label class="block text-xs text-gray-400 mb-2" id="name-label">Your Name</label>
        <input type="text" id="review-name" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm" required>
      </div>
      <div class="mb-4">
        <label class="block text-xs text-gray-400 mb-2" id="review-text-label">Your Review</label>
        <textarea id="review-text" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm resize-none" required></textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="flex-1 bg-amber-400 text-black py-2 rounded-lg text-xs font-bold uppercase" id="submit-review-btn">Submit</button>
        <button type="button" onclick="closeReviewModal()" class="flex-1 border border-gray-600 text-gray-300 py-2 rounded-lg text-xs uppercase" id="cancel-review-btn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
// ==================== CONFIGURATION ====================
const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:8787' : 'https://api.silkisland.ro';
let product = null;
let selectedColor = null;
let selectedSize = null;
let selectedQuantity = 1;
let currentRating = 5;
let currentLanguage = localStorage.getItem('language') || 'en';

// ==================== LINGERIE COLOR PALETTE ====================
const LINGERIE_COLORS = {
  'Black': { hex: '#1a1a1a', translation: { en: 'Black', ro: 'Negru', tr: 'Siyah' } },
  'White': { hex: '#ffffff', translation: { en: 'White', ro: 'Alb', tr: 'Beyaz' } },
  'Nude': { hex: '#E3BC9A', translation: { en: 'Nude', ro: 'Nud', tr: 'Ten' } },
  'Mauve': { hex: '#E0B0FF', translation: { en: 'Mauve', ro: 'Mov', tr: 'Leylak' } },
  'Cherry': { hex: '#8B0000', translation: { en: 'Cherry', ro: 'Vișiniu', tr: 'Kiraz' } },
  'Pink Peach': { hex: '#FFDAB9', translation: { en: 'Pink Peach', ro: 'Piersică Roz', tr: 'Pembe Şeftali' } },
  'Rose': { hex: '#E8A2B4', translation: { en: 'Rose', ro: 'Roz', tr: 'Gül' } },
  'Powder Pink': { hex: '#F4C2C2', translation: { en: 'Powder Pink', ro: 'Roz Pudrat', tr: 'Pudra Pembesi' } },
  'Burgundy': { hex: '#800020', translation: { en: 'Burgundy', ro: 'Burgund', tr: 'Bordo' } },
  'Navy': { hex: '#000080', translation: { en: 'Navy', ro: 'Bleumarin', tr: 'Lacivert' } },
  'Midnight Blue': { hex: '#191970', translation: { en: 'Midnight Blue', ro: 'Albastru Miez de Noapte', tr: 'Gece Mavisi' } },
  'Gold': { hex: '#FFD700', translation: { en: 'Gold', ro: 'Auriu', tr: 'ALTIN' } },
  'Silver': { hex: '#C0C0C0', translation: { en: 'Silver', ro: 'Argintiu', tr: 'Gümüş' } },
  'Cappuccino': { hex: '#C1A58B', translation: { en: 'Cappuccino', ro: 'Cappuccino', tr: 'Cappuccino' } },
  'Light Beige': { hex: '#F5E6D3', translation: { en: 'Light Beige', ro: 'Bej Deschis', tr: 'AçIk Bej' } },
  'Dark Beige': { hex: '#D4B896', translation: { en: 'Dark Beige', ro: 'Bej Închis', tr: 'Koyu Bej' } }
};

// ==================== TRANSLATIONS ====================
const translations = {
  en: {
    colors: 'Colors',
    size: 'Size',
    addToCart: 'Add to Cart',
    reviews: 'Customer Reviews',
    writeReview: 'Write a Review',
    related: 'You May Also Like',
    sizeGuide: 'Size Guide',
    productVideo: 'Product Video',
    quantity: 'Quantity',
    total: 'Total',
    proceedCheckout: 'Proceed to Checkout',
    yourCart: 'Your Cart',
    noReviews: 'No reviews yet. Be the first!',
    sizeGuideTitle: 'Size Guide',
    limitedEdition: 'Limited Edition',
    selectColor: 'Select a color',
    selectSize: 'Select a size'
  },
  ro: {
    colors: 'Culori',
    size: 'Mărime',
    addToCart: 'Adaugă în Coș',
    reviews: 'Recenzii Clienți',
    writeReview: 'Scrie o Recenzie',
    related: 'Ți-ar putea plăcea și',
    sizeGuide: 'Ghid Mărimi',
    productVideo: 'Video Produs',
    quantity: 'Cantitate',
    total: 'Total',
    proceedCheckout: 'Continuă Spre Plată',
    yourCart: 'Coșul Tău',
    noReviews: 'Nicio recenzie. Fii primul!',
    sizeGuideTitle: 'Ghid Mărimi',
    limitedEdition: 'Ediție Limitată',
    selectColor: 'Alege o culoare',
    selectSize: 'Alege o mărime'
  },
  tr: {
    colors: 'Renkler',
    size: 'Beden',
    addToCart: 'Sepete Ekle',
    reviews: 'Müşteri Yorumları',
    writeReview: 'Yorum Yaz',
    related: 'Bunlar da Hoşunuza Gidebilir',
    sizeGuide: 'Beden Rehberi',
    productVideo: 'Ürün Videosu',
    quantity: 'Miktar',
    total: 'Toplam',
    proceedCheckout: 'Ödemeye Geç',
    yourCart: 'Sepetiniz',
    noReviews: 'Henüz yorum yok. İlk sen yaz!',
    sizeGuideTitle: 'Beden Rehberi',
    limitedEdition: 'Sınırlı Üretim',
    selectColor: 'Renk seçin',
    selectSize: 'Beden seçin'
  }
};

function t(key) {
  return translations[currentLanguage][key] || translations.en[key];
}

function translateColor(colorName) {
  const colorData = LINGERIE_COLORS[colorName];
  if (colorData && colorData.translation[currentLanguage]) {
    return colorData.translation[currentLanguage];
  }
  return colorName;
}

// ==================== LOAD PRODUCT ====================
async function loadProduct() {
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');
  
  if (!productId) {
    window.location.href = '/';
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/api/products/${productId}`);
    if (!response.ok) throw new Error('Product not found');
    product = await response.json();
    
    selectedColor = product.colors?.[0] || Object.keys(LINGERIE_COLORS)[0];
    selectedSize = product.sizes?.[0] || 'M';
    
    await renderProduct();
  } catch (error) {
    console.error('Failed to load product:', error);
    document.getElementById('product-container').innerHTML = `
      <div class="text-center py-20">
        <p class="text-red-500">Failed to load product. Please try again.</p>
        <button onclick="location.reload()" class="mt-4 bg-amber-400 text-black px-6 py-2 rounded">Retry</button>
      </div>
    `;
  }
}

// ==================== RENDER PRODUCT ====================
async function renderProduct() {
  const container = document.getElementById('product-container');
  const images = product.images || [product.image_url || '/images/placeholder.jpg'];
  const mainImage = images[0];
  
  container.innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      <!-- Images Section -->
      <div class="space-y-4">
        <div class="overflow-hidden bg-gray-900 rounded-lg border border-gray-800">
          <img src="${mainImage}" alt="${product.name}" id="main-image" class="w-full h-auto object-contain cursor-zoom-in" onclick="openLightbox(0)">
        </div>
        ${images.length > 1 ? `
          <div class="flex gap-2 overflow-x-auto hide-scrollbar">
            ${images.map((img, i) => `
              <img src="${img}" onclick="changeMainImage(${i})" class="w-20 h-20 object-cover rounded-lg cursor-pointer border-2 ${i === 0 ? 'border-amber-400' : 'border-gray-700'} hover:border-amber-400/50 transition-all">
            `).join('')}
          </div>
        ` : ''}
        ${product.video_url ? `
          <div class="mt-4">
            <p class="text-xs uppercase tracking-wider text-gray-400 mb-2">${t('productVideo')}</p>
            <video autoplay loop muted playsinline class="w-full rounded-lg border border-gray-800">
              <source src="${product.video_url}" type="video/mp4">
            </video>
          </div>
        ` : ''}
      </div>
      
      <!-- Product Info Section -->
      <div class="space-y-6">
        <div>
          <p class="text-amber-500 uppercase tracking-[0.2em] text-xs mb-2">${product.category || t('limitedEdition')}</p>
          <h1 class="font-headline text-4xl md:text-5xl text-amber-400">${product.name}</h1>
          <p class="font-headline text-3xl text-amber-400 mt-4">${product.price} RON</p>
        </div>
        
        <p class="text-gray-300 font-light leading-relaxed" id="product-description">${product.description || 'A timeless piece from the Private Collection.'}</p>
        
        <!-- Color Selector -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-3">${t('colors')}</label>
          <div class="flex flex-wrap gap-3" id="color-selector">
            ${(product.colors || ['Black', 'White', 'Nude']).map(color => `
              <div class="flex flex-col items-center gap-1">
                <div class="color-swatch ${selectedColor === color ? 'active' : ''}" 
                     style="background-color: ${LINGERIE_COLORS[color]?.hex || '#888'};"
                     data-color="${color}"
                     onclick="selectColor('${color}')">
                </div>
                <span class="text-xs text-gray-400">${translateColor(color)}</span>
              </div>
            `).join('')}
          </div>
        </div>
        
        <!-- Size Selector -->
        <div>
          <div class="flex justify-between items-center mb-3">
            <label class="block text-xs uppercase tracking-wider text-gray-400">${t('size')}: <span id="selected-size-display">${selectedSize}</span></label>
            <button onclick="openSizeGuide()" class="text-xs text-amber-400/70 hover:text-amber-400 uppercase tracking-wider flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">straighten</span>${t('sizeGuide')}
            </button>
          </div>
          <div class="flex flex-wrap gap-3" id="size-selector">
            ${(product.sizes || ['XS', 'S', 'M', 'L', 'XL']).map(size => `
              <button class="size-btn ${selectedSize === size ? 'active' : ''}" data-size="${size}" onclick="selectSize('${size}')">${size}</button>
            `).join('')}
          </div>
        </div>
        
        <!-- Quantity Selector -->
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-3">${t('quantity')}</label>
          <div class="flex items-center gap-4">
            <button onclick="updateQuantity(-1)" class="quantity-btn">−</button>
            <span id="quantity-display" class="text-xl font-bold w-12 text-center">${selectedQuantity}</span>
            <button onclick="updateQuantity(1)" class="quantity-btn">+</button>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex gap-4 pt-4">
          <button onclick="addToCart()" class="flex-1 bg-amber-400 text-black py-4 font-bold uppercase tracking-wider text-sm rounded-lg hover:bg-amber-500 transition">
            ${t('addToCart')}
          </button>
          <button onclick="toggleFavorite()" class="p-4 border border-gray-700 rounded-lg hover:border-amber-400 transition">
            <span class="material-symbols-outlined text-amber-400">favorite</span>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Reviews Section -->
    <div class="mt-16 border-t border-gray-800 pt-8">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-headline text-2xl text-amber-400">${t('reviews')}</h3>
        <button onclick="openReviewModal()" class="flex items-center gap-2 bg-amber-400 text-black px-6 py-2 rounded-lg text-xs font-bold uppercase">
          <span class="material-symbols-outlined text-lg">add</span>${t('writeReview')}
        </button>
      </div>
      <div id="reviews-list" class="space-y-6"></div>
    </div>
    
    <!-- Related Products -->
    <div class="mt-16 border-t border-gray-800 pt-8">
      <h3 class="font-headline text-2xl text-amber-400 mb-6">${t('related')}</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="related-products"></div>
    </div>
  `;
  
  await loadReviews();
  await loadRelatedProducts();
  updateCartCount();
}

// ==================== INTERACTIONS ====================
function selectColor(color) {
  selectedColor = color;
  document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.classList.remove('active');
    if (swatch.dataset.color === color) swatch.classList.add('active');
  });
}

function selectSize(size) {
  selectedSize = size;
  document.getElementById('selected-size-display').textContent = size;
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.size === size) btn.classList.add('active');
  });
}

function updateQuantity(delta) {
  selectedQuantity = Math.max(1, Math.min(99, selectedQuantity + delta));
  document.getElementById('quantity-display').textContent = selectedQuantity;
}

function addToCart() {
  let cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
  const existingItem = cart.find(item => 
    item.id === product.id && item.size === selectedSize && item.color === selectedColor
  );
  
  if (existingItem) {
    existingItem.quantity += selectedQuantity;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      size: selectedSize,
      color: selectedColor,
      colorHex: LINGERIE_COLORS[selectedColor]?.hex,
      quantity: selectedQuantity,
      image: product.images?.[0] || product.image_url
    });
  }
  
  localStorage.setItem('silkisland_cart', JSON.stringify(cart));
  updateCartCount();
  updateCartDisplay();
  alert(`${selectedQuantity} × ${product.name} (${translateColor(selectedColor)}, ${selectedSize}) added to cart!`);
}

function toggleFavorite() {
  let favorites = JSON.parse(localStorage.getItem('silkisland_favorites') || '[]');
  if (favorites.includes(product.id)) {
    favorites = favorites.filter(id => id !== product.id);
    alert('Removed from favorites');
  } else {
    favorites.push(product.id);
    alert('Added to favorites!');
  }
  localStorage.setItem('silkisland_favorites', JSON.stringify(favorites));
}

function changeMainImage(index) {
  const images = product.images || [product.image_url];
  document.getElementById('main-image').src = images[index];
  document.querySelectorAll('.flex.gap-2 img').forEach((img, i) => {
    if (i === index) img.classList.add('border-amber-400', 'border-2');
    else img.classList.remove('border-amber-400', 'border-2');
  });
}

// ==================== CART FUNCTIONS ====================
function toggleCart() {
  const modal = document.getElementById('cart-modal');
  modal.classList.toggle('open');
  if (modal.classList.contains('open')) updateCartDisplay();
}

function updateCartDisplay() {
  const cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
  const container = document.getElementById('cart-items');
  const totalEl = document.getElementById('cart-total');
  
  if (cart.length === 0) {
    container.innerHTML = '<p class="text-center text-gray-400 py-8">Your cart is empty</p>';
    totalEl.textContent = '0 RON';
    return;
  }
  
  let total = 0;
  container.innerHTML = cart.map(item => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal;
    return `
      <div class="flex gap-4 border-b border-gray-800 pb-4">
        <img src="${item.image}" class="w-20 h-20 object-cover rounded">
        <div class="flex-1">
          <h4 class="font-medium">${item.name}</h4>
          <p class="text-sm text-gray-400">${translateColor(item.color)} / ${item.size}</p>
          <p class="text-amber-400">${item.price} RON × ${item.quantity}</p>
          <button onclick="removeFromCart('${item.id}', '${item.size}', '${item.color}')" class="text-xs text-red-400 mt-1">Remove</button>
        </div>
        <div class="text-right">
          <p class="font-bold">${itemTotal} RON</p>
        </div>
      </div>
    `;
  }).join('');
  
  totalEl.textContent = `${total} RON`;
}

function removeFromCart(id, size, color) {
  let cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
  cart = cart.filter(item => !(item.id === id && item.size === size && item.color === color));
  localStorage.setItem('silkisland_cart', JSON.stringify(cart));
  updateCartDisplay();
  updateCartCount();
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
  const count = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cart-count').textContent = count;
}

function goToCheckout() {
  window.location.href = '/checkout.html';
}

// ==================== REVIEWS ====================
function openReviewModal() {
  document.getElementById('review-modal').style.display = 'flex';
  setRating(5);
}

function closeReviewModal(event) {
  if (!event || event.target === document.getElementById('review-modal')) {
    document.getElementById('review-modal').style.display = 'none';
  }
}

function setRating(rating) {
  currentRating = rating;
  document.getElementById('review-rating').value = rating;
  const stars = document.querySelectorAll('#star-rating span');
  stars.forEach((star, i) => {
    if (i < rating) {
      star.style.fontVariationSettings = "'FILL' 1";
      star.style.color = '#FFD700';
    } else {
      star.style.fontVariationSettings = "'FILL' 0";
      star.style.color = '#6B7280';
    }
  });
}

function submitReview(event) {
  event.preventDefault();
  const review = {
    productId: new URLSearchParams(window.location.search).get('id'),
    name: document.getElementById('review-name').value,
    rating: currentRating,
    text: document.getElementById('review-text').value,
    date: new Date().toISOString()
  };
  
  let reviews = JSON.parse(localStorage.getItem('silkisland_reviews') || '[]');
  reviews.push(review);
  localStorage.setItem('silkisland_reviews', JSON.stringify(reviews));
  
  closeReviewModal();
  loadReviews();
  alert('Thank you for your review!');
  document.getElementById('review-name').value = '';
  document.getElementById('review-text').value = '';
}

function loadReviews() {
  const productId = new URLSearchParams(window.location.search).get('id');
  const reviews = JSON.parse(localStorage.getItem('silkisland_reviews') || '[]')
    .filter(r => r.productId === productId);
  
  const container = document.getElementById('reviews-list');
  if (reviews.length === 0) {
    container.innerHTML = `<p class="text-gray-400 italic text-center py-4">${t('noReviews')}</p>`;
    return;
  }
  
  container.innerHTML = reviews.reverse().map(r => `
    <div class="border-b border-gray-800 pb-4">
      <div class="flex items-center gap-2 mb-2">
        <div class="flex text-amber-400">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
        <span class="text-sm text-gray-400">${r.name}</span>
        <span class="text-xs text-gray-500">${new Date(r.date).toLocaleDateString()}</span>
      </div>
      <p class="text-sm text-gray-300">${r.text}</p>
    </div>
  `).join('');
}

// ==================== RELATED PRODUCTS ====================
async function loadRelatedProducts() {
  try {
    const response = await fetch(`${API_URL}/api/products`);
    const allProducts = await response.json();
    const related = allProducts
      .filter(p => p.category === product.category && p.id !== product.id)
      .sort(() => Math.random() - 0.5)
      .slice(0, 4);
    
    const container = document.getElementById('related-products');
    if (related.length === 0) {
      container.innerHTML = '<p class="text-gray-400">No related products found.</p>';
      return;
    }
    
    container.innerHTML = related.map(p => `
      <a href="/product.html?id=${p.id}" class="group block">
        <div class="aspect-[3/4] overflow-hidden bg-gray-900 rounded-lg">
          <img src="${p.images?.[0] || p.image_url}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
        </div>
        <p class="text-sm font-medium mt-2">${p.name}</p>
        <p class="text-amber-400">${p.price} RON</p>
      </a>
    `).join('');
  } catch (error) {
    console.error('Failed to load related products:', error);
  }
}

// ==================== LIGHTBOX ====================
function openLightbox(index) {
  const images = product.images || [product.image_url];
  let lightbox = document.getElementById('lightbox-modal');
  
  if (!lightbox) {
    lightbox = document.createElement('div');
    lightbox.id = 'lightbox-modal';
    lightbox.className = 'lightbox-modal';
    lightbox.innerHTML = `
      <span class="lightbox-close" style="position:absolute;top:20px;right:40px;font-size:40px;color:white;cursor:pointer;" onclick="closeLightbox()">&times;</span>
      <span class="lightbox-prev" style="position:absolute;left:20px;font-size:40px;color:white;cursor:pointer;" onclick="lightboxPrev()">❮</span>
      <span class="lightbox-next" style="position:absolute;right:20px;font-size:40px;color:white;cursor:pointer;" onclick="lightboxNext()">❯</span>
      <img id="lightbox-img" style="max-width:90%;max-height:90%;">
      <div id="lightbox-counter" style="position:absolute;bottom:20px;color:white;"></div>
    `;
    document.body.appendChild(lightbox);
  }
  
  window.currentLightboxImages = images;
  window.currentLightboxIndex = index;
  updateLightboxImage();
  lightbox.classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox-modal')?.classList.remove('active');
}

function lightboxNext() {
  window.currentLightboxIndex = (window.currentLightboxIndex + 1) % window.currentLightboxImages.length;
  updateLightboxImage();
}

function lightboxPrev() {
  window.currentLightboxIndex = (window.currentLightboxIndex - 1 + window.currentLightboxImages.length) % window.currentLightboxImages.length;
  updateLightboxImage();
}

function updateLightboxImage() {
  document.getElementById('lightbox-img').src = window.currentLightboxImages[window.currentLightboxIndex];
  document.getElementById('lightbox-counter').textContent = `${window.currentLightboxIndex + 1}/${window.currentLightboxImages.length}`;
}

// ==================== LANGUAGE HANDLING ====================
function updateLanguage() {
  currentLanguage = localStorage.getItem('language') || 'en';
  document.getElementById('language-select').value = currentLanguage;
  if (product) renderProduct();
}

document.getElementById('language-select').addEventListener('change', (e) => {
  localStorage.setItem('language', e.target.value);
  updateLanguage();
});

// Keyboard shortcuts for lightbox
document.addEventListener('keydown', (e) => {
  const lightbox = document.getElementById('lightbox-modal');
  if (!lightbox?.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'ArrowRight') lightboxNext();
});

// Initialize
loadProduct();

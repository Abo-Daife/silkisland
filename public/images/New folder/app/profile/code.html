<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#705e00",
                    "on-tertiary-fixed": "#360c1b",
                    "surface-container-low": "#1c1b1b",
                    "surface-variant": "#353534",
                    "on-secondary-fixed-variant": "#3b3d90",
                    "tertiary": "#fff4f5",
                    "inverse-surface": "#e5e2e1",
                    "on-tertiary-fixed-variant": "#6b3646",
                    "on-primary": "#3a3000",
                    "secondary-fixed": "#e1e0ff",
                    "on-primary-fixed-variant": "#544600",
                    "outline": "#999077",
                    "surface-container-high": "#2a2a2a",
                    "tertiary-container": "#ffcdd8",
                    "secondary-fixed-dim": "#c0c1ff",
                    "primary-fixed": "#ffe16d",
                    "surface-container-highest": "#353534",
                    "on-error": "#690005",
                    "surface-tint": "#e9c400",
                    "tertiary-fixed": "#ffd9e1",
                    "surface-dim": "#131313",
                    "on-surface-variant": "#d0c6ab",
                    "on-primary-fixed": "#221b00",
                    "tertiary-fixed-dim": "#fbb3c5",
                    "on-secondary": "#232479",
                    "secondary-container": "#3d3f93",
                    "on-background": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "error-container": "#93000a",
                    "primary": "#fff6df",
                    "on-surface": "#e5e2e1",
                    "on-error-container": "#ffdad6",
                    "inverse-on-surface": "#313030",
                    "secondary": "#c0c1ff",
                    "surface-bright": "#3a3939",
                    "primary-container": "#ffd700",
                    "on-secondary-fixed": "#0a0565",
                    "outline-variant": "#4d4732",
                    "background": "#131313",
                    "on-secondary-container": "#b0b2ff",
                    "primary-fixed-dim": "#e9c400",
                    "inverse-primary": "#705d00",
                    "error": "#ffb4ab",
                    "on-tertiary-container": "#874e5e",
                    "on-tertiary": "#502130",
                    "surface": "#131313",
                    "surface-container": "#201f1f"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-temple-overlay {
            background: linear-gradient(to bottom, rgba(19, 19, 19, 0.8), rgba(19, 19, 19, 0.95));
        }
        .glass-panel {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] dark:bg-[#131313] bg-gradient-to-b from-[#1c1c1c] to-[#131313] shadow-[0px_2px_15px_rgba(0,0,0,0.5)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<button class="text-[#FFD9E1] hover:text-[#FFD700] transition-colors duration-300 scale-95 active:opacity-80">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="font-['Noto_Serif'] tracking-[0.05em] uppercase text-2xl font-bold tracking-widest text-[#FFD700]">
                SILKISLAND
            </div>
<div class="relative group">
<button class="text-[#FFD700] hover:text-[#FFD9E1] transition-colors duration-300 scale-95 active:opacity-80 flex items-center mr-2">
<span class="material-symbols-outlined">language</span>
</button>
<div class="absolute right-0 mt-2 w-32 bg-[#201f1f] border border-white/10 rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[60]">
<ul class="py-2">
<li><a class="block px-4 py-2 text-xs font-label uppercase tracking-widest text-on-surface hover:bg-primary-container hover:text-on-primary-container transition-colors" href="#">English</a></li>
<li><a class="block px-4 py-2 text-xs font-label uppercase tracking-widest text-on-surface hover:bg-primary-container hover:text-on-primary-container transition-colors" href="#">Romanian</a></li>
<li><a class="block px-4 py-2 text-xs font-label uppercase tracking-widest text-on-surface hover:bg-primary-container hover:text-on-primary-container transition-colors" href="#">Turkish</a></li>
</ul>
</div>
</div><button class="text-[#FFD9E1] hover:text-[#FFD700] transition-colors duration-300 scale-95 active:opacity-80">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative min-h-screen pt-16 pb-20 overflow-hidden flex items-center justify-center">
<!-- Background Image with Atrium Style -->
<div class="absolute inset-0 z-0">
<img alt="Dark atmospheric angel background" class="w-full h-full object-cover" data-alt="A dark and atmospheric scene featuring a winged figure, providing a dramatic backdrop for the sanctuary." src="https://lh3.googleusercontent.com/aida/ADBb0uhAVeLiVdMorneZZRLpz49xYMQXBJT7YRhWpln8pWWNOqjWixLThn74CqKhP-DVogdZOuaa5b85jsSZiP2D00etb9ftINGX375qZKHXEiKVfbo3gFoLf2GLbUkdh5M3QAqyqBwKlzFlw-3PtMj-kQpyzlYJb-zWmqeg2mMV9bZ37MiKg1DAW4bJuWphYgtvU9puTKBomhWo2blWoVqa0IXs7TfVETX6bUCywvRwFgoRaE9OTtqEhQGrTrLn8grz55jH1vHr1EMpJA"/>
<div class="absolute inset-0 bg-temple-overlay"></div>
</div>
<div class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Header Section -->
<div class="mb-12 text-center md:text-left">
<p class="font-label text-[10px] uppercase tracking-[0.3em] text-tertiary-fixed-dim mb-2">The Digital Sanctuary</p>
<h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tight text-on-surface mb-4">Welcome Back</h1>
<div class="h-[1px] w-12 bg-primary-container/30"></div>
</div>
<!-- Form Container -->
<div class="glass-panel p-8 md:p-10 border border-white/5 rounded-lg shadow-2xl">
<form class="space-y-8">
<!-- Email Field -->
<div class="relative group">
<label class="block font-label text-[11px] uppercase tracking-widest text-tertiary-fixed mb-2 ml-1">Identity (Email)</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-b border-primary-container/20 text-on-surface placeholder:text-on-surface-variant/30 py-4 px-4 focus:ring-0 focus:border-primary-fixed transition-all duration-500 outline-none rounded-t-lg" placeholder="archetype@silkisland.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block font-label text-[11px] uppercase tracking-widest text-tertiary-fixed">Passage Code</label>
<a class="font-label text-[10px] uppercase tracking-tighter text-tertiary-fixed-dim hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-b border-primary-container/20 text-on-surface placeholder:text-on-surface-variant/30 py-4 px-4 focus:ring-0 focus:border-primary-fixed transition-all duration-500 outline-none rounded-t-lg" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-label font-bold uppercase tracking-widest text-sm hover:brightness-110 active:scale-[0.98] transition-all duration-300 rounded shadow-[0_0_20px_rgba(255,215,0,0.2)]" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Alternate Option -->
<div class="mt-10 text-center">
<p class="font-body text-xs text-on-surface-variant/60 mb-2">New to the sanctuary?</p>
<a class="font-label text-sm font-bold uppercase tracking-widest text-tertiary-fixed hover:text-primary-container transition-colors" href="#">Create an Account</a>
</div>
</div>
<!-- Footer Flourish -->
<div class="mt-12 text-center opacity-40">
<span class="material-symbols-outlined text-primary-fixed-dim scale-75">vignette</span>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed on large screens, shown on mobile) -->
<!-- The "Destination" Rule check: This is a top-level access point -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe bg-[#131313]/90 backdrop-blur-md z-50 border-t border-white/5 shadow-[0px_-10px_30px_rgba(0,0,0,0.8)]">
<button class="flex flex-col items-center justify-center text-[#FFD9E1]/60 hover:text-[#FFD700] transition-all tap-highlight-transparent active:scale-90">
<span class="material-symbols-outlined">home</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-tighter mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-[#FFD9E1]/60 hover:text-[#FFD700] transition-all tap-highlight-transparent active:scale-90">
<span class="material-symbols-outlined">search</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-tighter mt-1">Explore</span>
</button>
<button class="flex flex-col items-center justify-center text-[#FFD9E1]/60 hover:text-[#FFD700] transition-all tap-highlight-transparent active:scale-90">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-tighter mt-1">Cart</span>
</button>
<!-- ACTIVE TAB: Person (Profile/Login) -->
<button class="flex flex-col items-center justify-center text-[#FFD700] scale-110 transition-all tap-highlight-transparent active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-tighter mt-1">Profile</span>
</button>
</nav>
</body></html>

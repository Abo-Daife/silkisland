<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SilkIsland</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cinzel', serif;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/images/body.jpg');
      background-size: cover;
      min-height: 100vh;
      color: #FFD700;
      padding: 2rem;
    }
    .checkout-container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0,0,0,0.85);
      border: 2px solid #FFD700;
      border-radius: 16px;
      padding: 2rem;
    }
    h1, h2 {
      color: #FFD700;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      color: #E8A2B4;
      margin-bottom: 0.3rem;
    }
    input, textarea {
      width: 100%;
      padding: 0.8rem;
      background: #1a1a2e;
      border: 1px solid #FFD700;
      border-radius: 8px;
      color: #FFD700;
      font-family: inherit;
    }
    .payment-options {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
    }
    .payment-options label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .order-summary {
      background: #1a1a2e;
      padding: 1.5rem;
      border-radius: 8px;
      margin: 1.5rem 0;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      color: #E8A2B4;
      padding: 0.5rem 0;
      border-bottom: 1px dashed #FFD700;
    }
    .total {
      font-size: 1.5rem;
      color: #FFD700;
      text-align: right;
      margin-top: 1rem;
    }
    .btn {
      background: #FFD700;
      color: #0a0a1a;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #E8A2B4;
      transform: scale(1.02);
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    .back-link a {
      color: #E8A2B4;
      text-decoration: none;
    }
    .loading {
      display: none;
      text-align: center;
      color: #E8A2B4;
      margin-top: 1rem;
    }
    .loading.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="checkout-container">
    <h1>𓂀 Finalizează Comanda 𓂀</h1>
    
    <div id="status-message" style="display:none; padding:15px; margin-bottom:20px; border-radius:8px;"></div>
    
    <form id="checkout-form">
      <h2>Date de Livrare</h2>
      <div class="form-group">
        <label>Nume Complet *</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Telefon *</label>
        <input type="tel" id="phone" required>
      </div>
      <div class="form-group">
        <label>Adresă de Livrare *</label>
        <textarea id="address" rows="3" required></textarea>
      </div>
      
      <h2>Metodă de Plată</h2>
      <div class="payment-options">
        <label>
          <input type="radio" name="payment" value="cash" checked> 💵 Cash on Delivery
        </label>
        <label>
          <input type="radio" name="payment" value="card"> 💳 Card / Google Pay
        </label>
      </div>
      
      <div class="order-summary">
        <h3>Sumar Comandă</h3>
        <div id="order-items"></div>
        <div class="total" id="order-total">Total: 0 RON</div>
      </div>
      
      <button type="submit" class="btn" id="submit-btn">Plasează Comanda</button>
      <div class="loading" id="loading">Se procesează...</div>
    </form>
    
    <div class="back-link">
      <a href="/">← Înapoi la Magazin</a>
    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const API_URL = 'https://silkisland-api.amr-mokhtar301.workers.dev';
    const stripe = Stripe('pk_live_51TKMgJEqFnDyg3gakXA9wC0rscEnXuuZYYv4BSEuTVb6u3HCRLVywIE2CFhOvd6deAKu6ZaX6TAIsLbQ5axW7Fao005nEa1Olj');
    
    const cart = JSON.parse(localStorage.getItem('silkisland_cart') || '[]');
    const orderItems = document.getElementById('order-items');
    const orderTotal = document.getElementById('order-total');
    
    if (cart.length === 0) {
      orderItems.innerHTML = '<p style="color:#E8A2B4; text-align:center;">Coșul este gol</p>';
      document.getElementById('submit-btn').disabled = true;
    } else {
      let total = 0;
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        orderItems.innerHTML += `
          <div class="order-item">
            <span>${item.name} - ${item.size}/${item.color} x${item.quantity}</span>
            <span>${itemTotal.toFixed(2)} RON</span>
          </div>
        `;
      });
      orderTotal.textContent = `Total: ${total.toFixed(2)} RON`;
    }
    
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submit-btn');
      const loading = document.getElementById('loading');
      
      submitBtn.disabled = true;
      loading.classList.add('active');
      
      const customerInfo = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
      };
      
      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
      
      if (paymentMethod === 'card') {
        try {
          const response = await fetch(API_URL + '/api/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart, customerInfo })
          });
          
          const session = await response.json();
          
          if (session.url) {
            window.location.href = session.url;
          } else {
            alert('Eroare la crearea sesiunii de plată');
            submitBtn.disabled = false;
            loading.classList.remove('active');
          }
        } catch (error) {
          console.error('Stripe error:', error);
          alert('Eroare la conectarea cu procesatorul de plăți.');
          submitBtn.disabled = false;
          loading.classList.remove('active');
        }
      } else {
        try {
          const response = await fetch(API_URL + '/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart, customerInfo, paymentMethod: 'cash' })
          });
          
          const result = await response.json();
          
          if (result.success) {
            localStorage.removeItem('silkisland_cart');
            alert(`Comanda #${result.orderId} a fost plasată! Veți plăti cash la livrare.`);
            window.location.href = '/';
          } else {
            alert('Eroare la plasarea comenzii.');
          }
        } catch (error) {
          console.error('Checkout error:', error);
          alert('Eroare la procesarea comenzii.');
        } finally {
          submitBtn.disabled = false;
          loading.classList.remove('active');
        }
      }
    });
  </script>
</body>
</html>
